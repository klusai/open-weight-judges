# Judge model definitions for the open-weight panel study.
#
# Panel members run via Ollama (configure OLLAMA_BASE_URL in .env).
# Proprietary baselines run via OpenRouter (configure OPENROUTER_API_KEY in .env).
# Family constraints: no Llama, Qwen, Mistral, DeepSeek, Phi, Falcon, Cohere, SmolLM, Gemma.

panel:
  - name: granite-4.1-30b
    model: "granite4.1:30b"
    base_url: "${OLLAMA_BASE_URL}"
    api_key: "ollama"
    temperature: 0.0
    max_tokens: 4096
    use_strict_schema: true
    disable_thinking: false
    family: ibm

  - name: exaone-3.5-32b
    model: "exaone3.5:32b"
    base_url: "${OLLAMA_BASE_URL}"
    api_key: "ollama"
    temperature: 0.0
    max_tokens: 4096
    use_strict_schema: true
    disable_thinking: false
    family: lg

  - name: granite-3.3-8b
    model: "granite3.3:8b"
    base_url: "${OLLAMA_BASE_URL}"
    api_key: "ollama"
    temperature: 0.0
    max_tokens: 4096
    use_strict_schema: true
    disable_thinking: false
    family: ibm
    role: arbiter

proprietary_baselines:
  - name: gpt-o4-mini
    model: "openai/o4-mini"
    base_url: "${OPENROUTER_BASE_URL}"
    api_key: "${OPENROUTER_API_KEY}"
    temperature: 1.0
    max_tokens: 4096
    use_strict_schema: false
    reasoning_effort: "high"
    family: openai

  - name: gemini-2.5-flash
    model: "google/gemini-2.5-flash"
    base_url: "${OPENROUTER_BASE_URL}"
    api_key: "${OPENROUTER_API_KEY}"
    temperature: 0.0
    max_tokens: 4096
    use_strict_schema: false
    family: google

